name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.Version=${VERSION}"

          # macOS ARM (Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/c1-report-builder-darwin-arm64 .

          # macOS Intel
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/c1-report-builder-darwin-amd64 .

          # Linux AMD64
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/c1-report-builder-linux-amd64 .

          # Linux ARM64
          GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/c1-report-builder-linux-arm64 .

          # Windows AMD64
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/c1-report-builder-windows-amd64.exe .

          # Create checksums
          cd dist
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/c1-report-builder-darwin-arm64
            dist/c1-report-builder-darwin-amd64
            dist/c1-report-builder-linux-amd64
            dist/c1-report-builder-linux-arm64
            dist/c1-report-builder-windows-amd64.exe
            dist/checksums.txt
